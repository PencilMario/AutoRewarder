<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AutoRewarder</title>

  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="app">

    <!-- ==================== Header ==================== -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3 7h7l-5.5 4 2 7.5-6.5-4.5-6.5 4.5 2-7.5L2 9h7z"></path>
          </svg>
        </div>
        <div class="brand-text">
          <h1>AutoRewarder</h1>
          <span class="brand-sub">Microsoft Rewards · v3.4</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="manageBtn" class="icon-ghost" type="button" aria-label="管理账户" title="管理账户">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-ghost" type="button" aria-label="设置" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- ==================== Account card ==================== -->
    <section class="card account-card">
      <div class="card-label">账户</div>
      <div class="account-picker" id="account_picker">
        <button class="account-trigger" id="account_trigger" type="button" aria-haspopup="listbox" aria-expanded="false" disabled>
          <span class="avatar" id="current_avatar" aria-hidden="true">?</span>
          <span class="account-info">
            <span class="account-name" id="current_label">无账户</span>
            <span class="account-meta" id="current_meta">加载中…</span>
          </span>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="account-menu" id="account_menu" role="listbox" hidden></div>
      </div>
    </section>

    <!-- ==================== Run card ==================== -->
    <section class="card run-card">
      <div class="run-top">
        <label class="toggle-row" title="跳过搜索，仅完成每日 Rewards 任务">
          <input type="checkbox" id="dailyOnlyToggle">
          <span class="toggle-pill"></span>
          <span class="toggle-label">仅每日任务</span>
        </label>

        <div class="field-inline queries-panel">
          <span class="field-label">查询次数</span>
          <div class="count-group">
            <label class="count-field" title="桌面端搜索（Microsoft Rewards 每日最多 30 次）">
              <span>PC</span>
              <input type="number" id="count_pc" value="30" min="0" max="130">
            </label>
            <label class="count-field" title="移动端搜索（Microsoft Rewards 每日最多 20 次）">
              <span>Mobile</span>
              <input type="number" id="count_mobile" value="20" min="0" max="99">
            </label>
          </div>
        </div>

        <label class="toggle-row" title="在后台运行浏览器">
          <input type="checkbox" id="hideBrowserToggle">
          <span class="toggle-pill"></span>
          <span class="toggle-label">隐藏浏览器</span>
        </label>
      </div>

      <div class="run-actions">
        <button id="start_btn" class="primary-btn-lg" onclick="start_bot()" disabled>
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="6 4 20 12 6 20 6 4"></polygon>
          </svg>
          <span class="btn-label">开始运行</span>
        </button>
        <button id="stop_btn" class="stop-btn" type="button" onclick="stop_bot()" disabled aria-label="停止当前运行">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="1"></rect>
          </svg>
          <span class="stop-label">停止</span>
        </button>
      </div>

      <div class="status-row">
        <span class="dot" id="dot"></span>
        <span id="status_text">加载中…</span>
      </div>
    </section>

    <!-- ==================== Activity card ==================== -->
    <section class="card activity-card">
      <div class="card-header">
        <div class="card-label">活动</div>
        <button id="history_btn" class="ghost-link" type="button" onclick="show_history()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          查看历史
        </button>
      </div>
      <div id="log_area" class="activity-feed"></div>
    </section>

    <footer class="app-footer">
      AutoRewarder by <a href="#" id="repo_link" onclick="pywebview.api.open_link('https://github.com/safarsin/AutoRewarder'); return false;">safarsin</a>
    </footer>

  </main>

  <!-- ==================== Empty state (first launch) ==================== -->
  <div id="empty_state" class="empty-overlay" hidden>
    <div class="empty-card">
      <div class="empty-illu" aria-hidden="true">
        <svg width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="14" y="22" width="68" height="44" rx="4" fill="var(--surface-2)"></rect>
          <line x1="8" y1="70" x2="88" y2="70"></line>
          <line x1="38" y1="70" x2="58" y2="70" stroke-width="3" stroke="var(--surface-2)"></line>
          <circle cx="48" cy="42" r="11" fill="var(--accent-soft)" stroke="var(--accent)"></circle>
          <line x1="48" y1="36" x2="48" y2="48" stroke="var(--accent)"></line>
          <line x1="42" y1="42" x2="54" y2="42" stroke="var(--accent)"></line>
        </svg>
      </div>
      <h2 class="empty-title">欢迎使用 AutoRewarder</h2>
      <p class="empty-subtitle">添加您的第一个 Microsoft 账户以开始使用。</p>
      <button id="empty_cta" class="primary-btn-lg" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        创建您的第一个账户
      </button>
    </div>
  </div>

  <!-- ==================== Settings modal ==================== -->
  <div id="settings_modal" class="modal-backdrop" hidden>
    <div class="modal-box wide" role="dialog" aria-modal="true" aria-labelledby="settings_modal_title">
      <div class="modal-header">
        <h3 id="settings_modal_title" class="modal-title">设置</h3>
        <button id="settingsModalClose" class="icon-ghost" type="button" aria-label="关闭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">

        <section class="settings-group">
          <div class="settings-group-title">常规</div>
          <label class="settings-row">
            <div class="settings-row-text">
              <div class="settings-row-label">启用后台自动运行</div>
              <div class="settings-row-hint" id="startup_hint">在每个账户的预定时间自动在后台运行 AutoRewarder。</div>
            </div>
            <span class="toggle-compact">
              <input type="checkbox" id="startupToggle">
              <span class="toggle-pill"></span>
            </span>
          </label>
          <label class="settings-row">
            <div class="settings-row-text">
              <div class="settings-row-label">关闭到托盘</div>
              <div class="settings-row-hint">点击关闭按钮将最小化到系统托盘而非退出。下次启动时生效。</div>
            </div>
            <span class="toggle-compact">
              <input type="checkbox" id="closeToTrayToggle">
              <span class="toggle-pill"></span>
            </span>
          </label>
        </section>

        <section class="settings-group">
          <div class="settings-group-title">定时运行</div>
          <p class="settings-group-hint">
            每个账户一个计划。每次运行会在其时间窗口内的随机分钟触发，以模拟自然行为。
          </p>
          <div id="schedule_accounts_list" class="schedule-accounts-list"></div>
          <div id="schedule_empty" class="accounts-empty" hidden>
            暂无账户。请先添加一个账户来设置定时运行。
          </div>
        </section>

      </div>
      <div class="modal-footer">
        <button id="settingsCancel" class="btn-secondary" type="button">取消</button>
        <button id="settingsSave" class="btn-primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <!-- ==================== Accounts management modal ==================== -->
  <div id="accounts_modal" class="modal-backdrop" hidden>
    <div class="modal-box wide" role="dialog" aria-modal="true" aria-labelledby="accounts_modal_title">
      <div class="modal-header">
        <h3 id="accounts_modal_title" class="modal-title">您的账户</h3>
        <button id="accountsModalClose" class="icon-ghost" type="button" aria-label="关闭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <ul id="accounts_list" class="accounts-list"></ul>
        <button id="addAccountBtn" class="secondary-btn" type="button">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          添加账户
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== Toast container ==================== -->
  <div id="toast_container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ==================== Generic modal ==================== -->
  <div id="app_modal" class="modal-backdrop" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal_title">
      <div class="modal-header">
        <h3 id="modal_title" class="modal-title">标题</h3>
      </div>
      <div class="modal-body">
        <p id="modal_message" class="modal-message"></p>
        <input id="modal_input" class="modal-input" type="text" hidden>
      </div>
      <div class="modal-footer">
        <button id="modal_cancel" class="btn-secondary" type="button">取消</button>
        <button id="modal_confirm" class="btn-primary" type="button">确定</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="settings.js"></script>

</body>
</html>
